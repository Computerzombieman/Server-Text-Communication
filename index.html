<!DOCTYPE html>
<html>
    <div class="top-bar">
        <h1 style="vertical-align: middle; line-height: 40px;">
            Forum
        </h1>
    </div>
    <body>
        <div class="New-Forum">

            <body>
                <label>Name:</label> <br>
                <input id="name">
                <button id = "btn" class="Post">Create Post</button>
                
            </body>
            <br>
            <br>
            <body>
                <label class="Description">Description:</label>
                <textarea></textarea>
            </body>
            <br>
            <hr>
            
            
        </div>
                <script>
                    var btn = document.getElementById('btn')
                    btn.addEventListener('click',function(){
                        console.log("Hello World");
                        var nameInput = document.getElementById('name');
                        var nameValue = String(nameInput.value);
                        if (nameValue.length > 0) {
                            nameInput.value = '';
                            var objectList = document.getElementById('list');
                            var newPost = document.createElement('li');
                            
                            var topElement = null;
                            var topCount = -1;
                            var amt = 0

                            for (var element of objectList.children){
                                amt+=1;
                                var commentElement = element.querySelector('.comment-count');
                                if (!commentElement) continue;

                                var text = commentElement.textContent.trim();
                                var count = parseInt(text.split(' ')[0]);
                                if (count > topCount) {
                                    topCount = count;
                                    topElement = element;
                                }
                            }
                            newPost.className = "row"
                            newPost.innerHTML = `
                            <a class="attribute" href="./Thread.html">
                                <h4 class="title">
                                    ${nameValue}
                                </h4>
                                <div class = "bottom">
                                    <p class="timestamp">
                                        ${new Date().toLocaleDateString()}
                                    </p>
                                    <p id="comCount" class="comment-count">
                                        ${amt} comments
                                    </p>
                                </div>
                            </a>
                            `;
                            if (topElement) {
                                topElement.after(newPost);
                            } else {
                                objectList.appendChild(newPost);
                            }
                        }
                        
                    })
                </script>
    </body>

    <body>
        <div class="main">
            <ol id="list">
                <li class="row">
                    <a class="attribute" href="./Thread.html">
                        <h4 class="title">
                            I cheated on my wife, am I the bad guy?
                        </h4>
                        <div class = "bottom">
                            <p class="timestamp">
                                7/21/2003
                            </p>
                            <p id="comCount" class="comment-count">
                                2876818 comments
                            </p>
                        </div>
                    </a>
                </li>
                
            </ol>
            
        </div>
    </body>
    
    
    <style>
        
        body {
            margin: 10px 20px;
        }
        a {
            text-decoration: none;
            color: black;
        }
        h1,ol {
            margin: 0 0;
        }
        h4 {
            margin: 5px 0;
        }
        p {
            margin: 5px 0;
        }
        textarea {
            margin-top: 5px;
            width: 90%;
            resize:none;
            field-sizing: content;
        }
        .Description {
            display: flex;
            align-items: center;
        }
        .Post {
            padding: 2px 10px;
        }
        .New-Forum {
            padding:10px 15px;
            background-color:rgba(255, 250, 246, 0.973);
        }
        .main {
            padding: 10px 15px;
            background-color:rgba(255, 250, 246, 0.973);
        }
        .row {
            padding: 5px 0;
        }
        .bottom {
            display: flex;
            color: grey;
            font-size: 12px;

        }
        .timestamp {
            padding-right: 10px;
        }
        .top-bar {
            background-color: rgb(217, 237, 255);
            padding: 0 40px;
            height: 40px;
            font-size: 15px;
        }
    </style>
</html>
